<script>
  const topMenu = document.getElementById("ulTopMenu2");
  const tabContents = Array.from(document.querySelectorAll("[data-tab-content]"));

  const showTabContent = (target) => {
    if (!target) {
      return;
    }

    tabContents.forEach((section) => {
      section.style.display = section.dataset.tabContent === target ? "" : "none";
    });
  };

  if (topMenu) {
    topMenu.addEventListener("click", (event) => {
      const link = event.target.closest("a");
      if (!link || !topMenu.contains(link)) {
        return;
      }

      const activeItem = topMenu.querySelector("li.active");
      if (activeItem) {
        activeItem.classList.remove("active");
      }

      const parentItem = link.closest("li");
      if (parentItem) {
        parentItem.classList.add("active");
      }

      showTabContent(link.dataset.tabTarget);
    });

    const initialActiveLink = topMenu.querySelector("li.active a");
    if (initialActiveLink) {
      showTabContent(initialActiveLink.dataset.tabTarget);
    }
  }
</script>
<script>
  const iframe = document.getElementById('myIframe');
  iframe.onload = function() {
    // iframe 내부의 문서 높이를 가져와서 적용
    const docHeight = iframe.contentWindow.document.documentElement.scrollHeight;
    iframe.style.height = docHeight + 'px';
  };
</script>
