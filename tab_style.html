<html>

<head>
  <meta charset="utf-8" />
  <title>탭 스타일</title>
  <link rel="stylesheet" href="tab_style.css" />
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>


</head>

<body>
  <div id="ucTopMenu_UPTabOuter">
    <div class="tab_menu">
      <div class="tabouter">
        <ul id="ulTopMenu">
            <li><a id="ucTopMenu_linkBiz" class="link_pagetitle"><i class="ri-chat-2-line"></i>일반문자</a></li>
            <li><a id="ucTopMenu_linkRcs" class="link_pagetitle"><i class="ri-discuss-line"></i>RCS</a></li>
            <li class=""><a id="ucTopMenu_linkKakao" class="link_pagetitle"><i class="ri-kakao-talk-line"></i>친구톡</a></li>
            <li class=""><a id="ucTopMenu_linkKakaoAlimtalk" class="link_pagetitle"><i class="ri-kakao-talk-line"></i>알림톡</a></li>
            <li class=""><a id="ucTopMenu_linkWebLink" class="link_pagetitle"><i class="ri-file-list-3-line"></i>모바일전단</a></li>
            <li class=""><a id="ucTopMenu_linkOrder" class="link_pagetitle"><i class="ri-list-check-3"></i>주문기능</a></li>
            <li class=""><a id="ucTopMenu_linkGP" class="link_pagetitle"><i class="ri-team-line"></i>공동구매</a></li>
            <li class="active"><a id="ucTopMenu_linkCloud" class="link_pagetitle"><i class="ri-folder-image-line"></i>이미지클라우드</a></li>
            <li><a id="ucTopMenu_linkPush" class="link_pagetitle"><i class="ri-notification-2-line"></i>푸시메세지</a></li>
        </ul>
      </div>
      <div class="tabside">
        <ul>
            <li><a class="tabside__btn">온라인매뉴얼</a></li>
            <li><a class="tabside__btn">충전안내</a></li>
            <li><a class="tabside__btn">레포트</a></li>
        </ul>
      </div>
    </div>

  </div>
</body>

<script>
  const topMenu = document.getElementById("ulTopMenu");

  if (topMenu) {
    topMenu.addEventListener("click", (event) => {
      const link = event.target.closest("a");
      if (!link || !topMenu.contains(link)) {
        return;
      }

      const activeItem = topMenu.querySelector("li.active");
      if (activeItem) {
        activeItem.classList.remove("active");
      }

      const parentItem = link.closest("li");
      if (parentItem) {
        parentItem.classList.add("active");
      }
    });
  }
</script>
