</body>
<script>
  const topMenus = [
    document.getElementById("ulTopMenu"),
    document.getElementById("ulTopMenu2"),
  ].filter(Boolean);

  const tabMenu1 = document.getElementById("tabMenu1");
  const tabMenu2 = document.getElementById("tabMenu2");
  const tabContents = Array.from(document.querySelectorAll("[data-tab-content]"));

  const showTabMenu = (target) => {
    if (!tabMenu1 || !tabMenu2) {
      return;
    }

    const showFirst = target === "1";
    tabMenu1.style.display = showFirst ? "" : "none";
    tabMenu2.style.display = showFirst ? "none" : "";

    const activeLink = (showFirst ? tabMenu1 : tabMenu2)?.querySelector("li.active a");
    if (activeLink) {
      showTabContent(activeLink.dataset.tabTarget);
    }
  };

  const showTabContent = (target) => {
    if (!target) {
      return;
    }

    tabContents.forEach((section) => {
      section.style.display = section.dataset.tabContent === target ? "" : "none";
    });
  };

  document.querySelectorAll("[data-tab-switch]").forEach((button) => {
    button.addEventListener("click", (event) => {
      event.preventDefault();
      showTabMenu(button.dataset.tabSwitch);
    });
  });

  topMenus.forEach((menu) => {
    menu.addEventListener("click", (event) => {
      const link = event.target.closest("a");
      if (!link || !menu.contains(link)) {
        return;
      }

      const activeItem = menu.querySelector("li.active");
      if (activeItem) {
        activeItem.classList.remove("active");
      }

      const parentItem = link.closest("li");
      if (parentItem) {
        parentItem.classList.add("active");
      }

      showTabContent(link.dataset.tabTarget);
    });
  });

  const initialActiveLink = (tabMenu1?.style.display === "none" ? tabMenu2 : tabMenu1)?.querySelector(
    "li.active a"
  );
  if (initialActiveLink) {
    showTabContent(initialActiveLink.dataset.tabTarget);
  }
</script>
