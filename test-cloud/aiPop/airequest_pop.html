  <div class="relative w-full h-dvh max-h-dvh bg-gray-100">
    <div class="absolute inset-0">
      <div class="flex flex-col">
        <!-- 메뉴 탭 -->
        <div class="tab_submenu">
          <div class="tabs px-4" id="menuTab">
            <ul class="level1 static flex" tabindex="0" role="menubar">
              <li role="menuitem" class="static">
                <a class="level1 tab selected static flex px-4 pt-2 pb-1 border-b-6 font-bold" href="#" onclick="jsAIPopMenu(0)"
                  tabindex="-1">AI POP 만들기</a>
              </li>
              <li role="menuitem" class="static">
                <a class="level1 tab static flex px-4 pt-2 pb-1 border-b-6 border-transparent" href="_blank"
                  onclick="jsAIPopMenu(0)" tabindex="-1">AI 이미지 관리</a>
              </li>
              <li role="menuitem" class="static">
                <a class="level1 tab static flex px-4 pt-2 pb-1 border-b-6 border-transparent" href="#" onclick="jsAIPopMenu(0)"
                  tabindex="-1">이용현황</a>
              </li>
            </ul>
          </div>
        </div>
        <!-- 입력 폼 컨텐츠 -->
        <div class="relative flex gap-4 max-h-[calc(100dvh-(var(--spacing)*14))] p-4">
          <!-- 입력 영역 -->
          <div class="flex flex-col p-6 rounded-xl bg-white w-118">
            <div class="">
              <!-- 용도 선택 -->
              <div class="flex mb-5 mx-auto">
                <div id="selObject" class="flex gap-1 mx-auto border border-gray-300 p-1 rounded-full bg-gray-100">
                  <button type="button" class="px-3 py-2 shadow rounded-full text-left selected bg-gray-800 font-bold text-white cursor-pointer" onclick="location.href='airequest_pop.html'">
                    <div class="font-bold">POP이미지</div>
                  </button>
                  <button type="button" class="px-3 py-2 border-gray-300 rounded-full text-left cursor-pointer" onclick="location.href='airequest.html'">
                    <div class="font-bold">프라이스카드</div>
                  </button>
                  <button type="button" class="px-3 py-2 border-gray-300 rounded-full text-left cursor-pointer" onclick="location.href='airequest_flyer.html'">
                    <div class="font-bold">전단지</div>
                  </button>
                  <button type="button" class="px-3 py-2 border-gray-300 rounded-full text-left cursor-pointer" onclick="location.href='airequest_signage.html'">
                    <div class="font-bold">디지털사이니지</div>
                  </button>
                </div>
              </div>
              <!-- POP이미지 설정 -->
              <div id="pricecardBox" class="flex flex-col gap-5">
                <!-- POP이미지 레이아웃 -->
                <div class="ai_crt_fieldset">
                  <div class="text-sm font-bold">
                    <span class="text-red-500">*</span>유형
                  </div>
                  <div class="ai_crt_functionbox_row flex items-center gap-1 my-2">
                    <select class="w-full border border-gray-300 rounded p-2" onchange="jsSelectLayout(this)">
                      <option value="product">상품 홍보형</option>
                      <option value="notice" selected>안내/공지형</option>
                    </select>
                    <select class="w-full border border-gray-300 rounded p-2" onchange="jsSelectLayout(this)">
                      <option value="simple" selected>가로형</option>
                      <option value="detail">세로형</option>
                    </select>
                  </div>

                </div>

                <div class="ai_crt_fieldset">
                  <div class="text-sm font-bold">
                    <span class="text-red-500">*</span>표시 데이터
                  </div>
                  <div class="ai_crt_functionbox_row flex flex-col gap-1 my-2">
                    <div id="selPricecardColumn" class="flex items-center gap-1 mr-4">
                      <button type="button" class="flex items-center border border-[#26499d] px-2 py-1 rounded bg-[#26499d] text-white cursor-pointer selected" data-field="pricecard" data-column="name">
                        <div class="text-sm" style="font-size: 13px">
                          <span class="text-red-500" style="margin-left: -3px">*</span>상품명
                        </div>
                      </button>
                      <button type="button" class="flex items-center border border-[#26499d] px-2 py-1 rounded bg-[#26499d] text-white cursor-pointer selected" data-field="pricecard" data-column="dcprice">
                        <div class="text-sm">
                          <span class="text-red-500" style="margin-left: -3px">*</span>판매가
                        </div>
                      </button>

                      <button type="button" class="flex items-center border border-gray-300 px-2 py-1 rounded bg-white cursor-pointer" data-field="pricecard" data-column="spec"
                        onclick="jsSelectColumn(this)"
                      >
                        <div class="text-sm">규격</div>
                      </button>

                      <button type="button" class="flex items-center border border-[#26499d] px-2 py-1 rounded bg-[#26499d] text-white cursor-pointer" data-field="pricecard" data-column="sprice">
                        <div class="text-sm">바코드</div>
                      </button>
                      <button type="button" class="flex items-center border border-[#26499d] px-2 py-1 rounded bg-[#26499d] text-white cursor-pointer" data-field="pricecard" data-column="dcrate" onclick="jsSelectColumn(this)">
                        <div class="text-sm">정상판매가</div>
                      </button>
                    </div>
                    <div class="">
                      <input type="text" class=" flex items-center text-sm border border-gray-300 rounded p-2 inset-shadow-2xs" placeholder="엑셀에서 데이터를 복사한 후 여기에 붙여넣기 해주세요." style="width: 100%;"
                        oninput="jsMakeExcelData(this)">
                    </div>

                  </div>
                </div>
                <div class="ai_crt_fieldset">
                  <div class="text-sm font-bold">
                    <span class="text-red-500">*</span>가격단위
                  </div>
                  <div class="ai_crt_functionbox_row flex items-center gap-1 my-2">
                    <select class="w-1/2 border border-gray-300 rounded p-2" onchange="jsSelectLayout(this)">
                      <option value="product" selected>없음</option>
                      <option value="notice">￦(앞)</option>
                      <option value="notice">원(뒤)</option>
                      <option value="notice">￦(앞)</option>
                      <option value="notice">￦(앞)</option>
                    </select>
                  </div>
                  <div>노란칸에 붙여넣기 해주세요. 데이터 순서를 꼭 지켜주세요</div>

                </div>
                <!-- POP이미지 색상테마 -->
                <div class="ai_crt_fieldset">
                  <div class="text-lg font-bold">테마를 선택하세요.</div>
                  <div class="text-sm text-gray-500">선택한 테마에 어울리는 배경 색감 분위기가 자동으로 생성됩니다.</div>
                  <div id="selPricecardTheme" class="ai_crt_functionbox_row flex items-center gap-1 my-2" data-theme="">
                    <button type="button" class="flex items-center px-2 py-1 border border-gray-300 rounded" onclick="jsSelectTheme('yellow')">
                      <div class="flex items-center text-sm">
                        자동
                      </div>
                    </button>
                    <button type="button" class="flex items-center px-2 py-1 border border-gray-300 rounded" onclick="jsSelectTheme('red')">
                      <div class="flex items-center text-sm">
                        산뜻한 / 자연적
                      </div>
                    </button>
                    <button type="button" class="flex items-center px-2 py-1 border border-gray-300 rounded" onclick="jsSelectTheme('green')">
                      <div class="flex items-center text-sm">
                        따뜻한 / 감성
                      </div>
                    </button>
                    <button type="button" class="flex items-center px-2 py-1 border border-gray-300 rounded" onclick="jsSelectTheme('blue')">
                      <div class="flex items-center text-sm">
                        강렬한 / 원색
                      </div>
                    </button>
                    <button type="button" class="flex items-center px-2 py-1 border border-gray-300 rounded" onclick="jsSelectTheme('white')">
                      <div class="flex items-center text-sm">
                        모던 / 심플
                      </div>
                    </button>
                  </div>
                </div>
                <!-- POP이미지 행사 타이틀변경 -->
                <div class="ai_crt_fieldset">
                  <div class="text-lg font-bold">행사 타이틀을 입력하세요</div>
                  <div class="text-sm text-gray-500">입력하신 내용을 반영하여 AI 이미지가 생성됩니다.</div>
                  <div id="selPricecardTheme" class="ai_crt_functionbox_row flex items-center gap-1 my-2">
                    <input type="text" class="flex items-center text-sm border border-gray-300 rounded p-1 inset-shadow-2xs" placeholder="행사 타이틀을 입력해주세요." style="width: 100%;">
                  </div>
                </div>
              </div>
            </div>

          </div>
          <!-- 미리보기 영역 -->
          <div class="flex max-w-7xl overflow-hidden">
            <div class="flex flex-col w-full h-full max-h-[calc(100dvh-(var(--spacing)*14))] rounded-xl p-4 bg-white">
              <div class="w-full h-full overflow-y-auto">

              </div>
            </div>
          </div>

          <!-- TS머니 영역 -->
          <div class="sticky top-4 left-0 flex max-w-7xl overflow-hidden">
            <div class="flex flex-col w-96 rounded-xl p-4 bg-white">

            </div>
          </div>

        </div>

      </div>
    </div>

  <div id="printArea" style="width: 0px; height: 0px;"></div>
