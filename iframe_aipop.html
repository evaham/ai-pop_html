<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-POP 링크</title>
  <link rel="stylesheet" href="iframe_style.css" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
  />
</head>
<body>
  <div class="app">
    <div class="wrap-side">
      <div class="side">
        <div class="side-logo">
          <p style="text-align: center;">AI POP</p>
        </div>
        <ul class="side-menu">
          <li>
            <a href="#">
              AI POP 만들기
            </a>
          </li>
          <li class="active">
            <a href="#">
              AI 이미지 관리
            </a>
          </li>
        </ul>
        <hr />
        <ul class="side-menu" style="display: none; margin-top:40px">
          <li>
            <a href="#">
              AI 이미지 관리
            </a>
          </li>
          <li class="active">
            <a href="#">
              메뉴3
            </a>
            <ul class="side-submenu">
              <li><a href="#">서브메뉴1</a></li>
              <li class="active"><a href="#">서브메뉴2</a></li>
              <li><a href="#">서브메뉴3</a></li>
            </ul>
          </li>

          <li>
            <a href="#">
              AI 이미지 관리
            </a>
          </li>

        </ul>

      </div>
      <div class="container">
        <div>페이지 타이틀</div>
        <hr />
        <div>
          <p>컨텐츠 타이틀</p>
          <p>컨텐츠 내용</p>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener("click", (event) => {
      const link = event.target.closest(".side-menu a");
      if (!link) {
        return;
      }

      event.preventDefault();
      const item = link.closest("li");
      const submenu = link.closest(".side-submenu");

      if (submenu) {
        const parentItem = submenu.closest("li");
        const topMenu = submenu.closest(".side-menu");
        if (!item || !parentItem || !topMenu) {
          return;
        }

        topMenu.querySelectorAll(":scope > li.active").forEach((li) => {
          if (li !== parentItem) {
            li.classList.remove("active");
          }
        });
        parentItem.classList.add("active");

        submenu.querySelectorAll(":scope > li.active").forEach((li) => {
          if (li !== item) {
            li.classList.remove("active");
          }
        });
        item.classList.add("active");
        return;
      }

      const menu = link.closest("ul");
      if (!item || !menu) {
        return;
      }

      const childSubmenu = item.querySelector(":scope > .side-submenu");

      menu.querySelectorAll(":scope > li.active").forEach((li) => {
        if (li !== item) {
          li.classList.remove("active");
        }
      });
      menu.querySelectorAll(".side-submenu li.active").forEach((li) => {
        li.classList.remove("active");
      });
      item.classList.add("active");

      if (childSubmenu) {
        const firstChild = childSubmenu.querySelector(":scope > li");
        if (firstChild) {
          firstChild.classList.add("active");
        }
      }
    });
  </script>
</body>
</html>
